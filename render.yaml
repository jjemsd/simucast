# Render blueprint — deploys backend API, frontend static site, and postgres DB
# usage: connect your repo to render.com and point it at this file
services:
  # --- backend API ---
  - type: web
    name: simucast-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: simucast-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"  # lock this down to your frontend URL in prod
      - key: PYTHON_VERSION
        value: "3.11"

  # --- frontend static site ---
  - type: web
    name: simucast-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://simucast-api.onrender.com  # update after first deploy
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# --- database ---
databases:
  - name: simucast-db
    plan: free
    databaseName: simucast
    user: simucast
