# Render blueprint — deploys backend API, frontend static site, and postgres DB
services:
  # --- backend API ---
  - type: web
    name: simucast-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: simucast-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11"

  # --- frontend static site ---
  # NOTE: rootDir is NOT used — Render's rootDir + staticPublishPath combo
  # can resolve paths incorrectly, causing CSS/JS to be served as text/plain.
  # Using cd in buildCommand + full path in staticPublishPath is more reliable.
  - type: web
    name: simucast-web
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://simucast-api.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# --- database ---
databases:
  - name: simucast-db
    plan: free
    databaseName: simucast
    user: simucast
